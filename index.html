<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <title>Calcul De Rang</title>
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="stylesheet" href="stylesheet.css">
</head>
<body>
  <h2>NOTES:</h2>
  <form action="/submit" method="POST">
    <div class="tab-container">
      <div class="box-tab" data-value="MP">MP</div>
      <div class="box-tab" data-value="PC">PC</div>
    </div>
  </form>
  <br>
  <form action="/submit" method="POST">
    <div class="main-box">
      <div class="input-group">
        <label for="analyse">Analyse:</label>
        <input type="number" id="analyse" name="grades" min="0" max="20" step="1" value="0">
      </div>

      <div class="input-group">
        <label for="algebre">Algebre:</label>
        <input type="number" id="algebre" name="grades" min="0" max="20" step="1" value="0">
      </div>

      <div class="input-group">
        <label for="physique">Physique:</label>
        <input type="number" id="physique" name="grades" min="0" max="20" step="1" value="0">
      </div>

      <div class="input-group">
        <label for="chimie">Chimie:</label>
        <input type="number" id="chimie" name="grades" min="0" max="20" step="1" value="0">
      </div>

      <div class="input-group">
        <label for="informatique">Informatique:</label>
        <input type="number" id="informatique" name="grades" min="0" max="20" step="1" value="0">
      </div>

      <div class="input-group">
        <label for="anglais">Anglais:</label>
        <input type="number" id="anglais" name="grades" min="0" max="20" step="1" value="0">
      </div>

      <div class="input-group">
        <label for="francais">Français:</label>
        <input type="number" id="francais" name="grades" min="0" max="20" step="1" value="0">
      </div>

      <div class="input-group">
        <label for="sta">STA:</label>
        <input type="number" id="sta" name="grades" min="0" max="20" step="1" value="0">
      </div>
      <div class="input-group">
        <label for="year">Année:</label>
        <select id="year" name="year">
          <option value="2025">2025</option>
          <option value="2024">2024</option>
        </select>
      </div>
    <div id="result">Rang ≈ 0</div>
    <div id="result2">Moyenne = 0</div>
  </div>
  <script src="Javascript.js"></script>
</body>
</html>
